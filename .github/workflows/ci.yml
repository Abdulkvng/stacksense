name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python --version
        python -m pip --version
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run linter
      run: |
        echo "Running flake8..."
        flake8 stacksense/ --count --select=E9,F63,F7,F82 --show-source --statistics
        echo "Checking code formatting with black..."
        black --check stacksense/ --diff || (echo "❌ Code formatting check failed. Run 'black stacksense/' to auto-format." && exit 1)
    
    - name: Run type checker
      run: |
        mypy stacksense/ || true
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=stacksense --cov-report=xml || true
    
    - name: Upload coverage
      if: ${{ hashFiles('coverage.xml') != '' }}
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t stacksense:test -f docker/Dockerfile.example .
    
    - name: Test Docker image
      run: |
        docker run --rm stacksense:test python -c "import stacksense; print('StackSense imported successfully')"
