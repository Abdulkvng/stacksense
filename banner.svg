<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="400" y1="150" x2="800" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <ellipse cx="600" cy="200" rx="400" ry="150" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Decorative dots -->
  <g opacity="0.12" fill="#a855f7">
    <circle cx="180" cy="120" r="2"/>
    <circle cx="350" cy="280" r="1.5"/>
    <circle cx="850" cy="100" r="2"/>
    <circle cx="1020" cy="300" r="1.5"/>
    <circle cx="750" cy="320" r="1.5"/>
    <circle cx="450" cy="90" r="1.5"/>
  </g>

  <!-- Lightning bolt icon -->
  <g transform="translate(510, 100)">
    <path d="M40 0 L15 50 L30 50 L20 90 L55 35 L38 35 Z" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="600" y="185" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" letter-spacing="-1">
    StackSense
  </text>

  <!-- Tagline -->
  <text x="600" y="230" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="400">
    Know exactly what your AI costs.
  </text>

  <!-- Pills -->
  <g transform="translate(600, 270)">
    <!-- Pill 1 -->
    <rect x="-280" y="-14" width="120" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="-220" y="5" text-anchor="middle" fill="#d4d4d8" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500">13 Providers</text>

    <!-- Pill 2 -->
    <rect x="-130" y="-14" width="120" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="-70" y="5" text-anchor="middle" fill="#d4d4d8" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500">Zero Config</text>

    <!-- Pill 3 -->
    <rect x="20" y="-14" width="120" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="80" y="5" text-anchor="middle" fill="#d4d4d8" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500">Open Source</text>

    <!-- Pill 4 -->
    <rect x="170" y="-14" width="120" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="230" y="5" text-anchor="middle" fill="#d4d4d8" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500">2 Lines of Code</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#accent)"/>
</svg>
