<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="fadeLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.7"/>

  <!-- Faint horizontal accent lines for texture -->
  <rect x="0" y="100" width="1200" height="1" fill="url(#fadeLine)" opacity="0.4"/>
  <rect x="0" y="200" width="1200" height="1" fill="url(#fadeLine)" opacity="0.4"/>

  <!-- Left icon: stacked layers -->
  <g transform="translate(365, 72)">
    <path d="M30 40 L0 26 L30 12 L60 26 Z" fill="#6366f1" opacity="0.15"/>
    <path d="M30 30 L0 16 L30 2 L60 16 Z" fill="#6366f1" opacity="0.3"/>
    <path d="M30 20 L0 6 L30 -8 L60 6 Z" fill="#818cf8" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="600" y="112" text-anchor="middle" fill="#fafafa" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="50" font-weight="800" letter-spacing="-1.5">StackSense</text>

  <!-- Tagline -->
  <text x="600" y="148" text-anchor="middle" fill="#71717a" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="400" letter-spacing="0.3">Know exactly what your AI costs.</text>

  <!-- Divider -->
  <rect x="555" y="168" width="90" height="1" rx="0.5" fill="url(#accent)" opacity="0.35"/>

  <!-- Stat pills row -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">
    <rect x="310" y="190" width="112" height="28" rx="14" fill="none" stroke="#6366f1" stroke-opacity="0.35" stroke-width="1"/>
    <text x="366" y="208" text-anchor="middle" fill="#818cf8">13 Providers</text>

    <rect x="440" y="190" width="100" height="28" rx="14" fill="none" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
    <text x="490" y="208" text-anchor="middle" fill="#a78bfa">Zero Config</text>

    <rect x="558" y="190" width="108" height="28" rx="14" fill="none" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
    <text x="612" y="208" text-anchor="middle" fill="#a78bfa">Open Source</text>

    <rect x="684" y="190" width="126" height="28" rx="14" fill="none" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
    <text x="747" y="208" text-anchor="middle" fill="#c084fc">2 Lines of Code</text>
  </g>

  <!-- Install hint -->
  <rect x="460" y="240" width="280" height="32" rx="6" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="600" y="261" text-anchor="middle" fill="#52525b" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" font-weight="400">$ pip install stacksense</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="298" width="1200" height="2" fill="url(#accent)" opacity="0.7"/>
</svg>
